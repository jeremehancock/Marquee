name: Publish Docker image

# Build and push the multi-arch image to Docker Hub whenever main is updated.
# Also runs on version tags (v1.2.3 -> tagged releases) and can be triggered by
# hand from the Actions tab.
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

# Don't let two publishes race; a newer push supersedes an in-flight one.
concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  publish:
    name: Build and push (linux/amd64, linux/arm64)
    runs-on: ubuntu-latest
    # Skip on forks: only the source repo has the Docker Hub credentials.
    if: github.repository_owner == 'jeremehancock'
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: bozodev/marquee
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
